<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>U-Konek+ — Medical Personnel System</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="auth-page">
    <div id="preloader" class="preloader">
        <div class="preloader-logo" aria-hidden="true">
            <img src="../U-KonekLogo-transparent.png" alt="">
        </div>
    </div>
    <div class="wrap">
        <div class="side" role="side">
            <div class="SiteName">
                <img class="logoLogIn" src="../U-KonekLogo-transparent.png" alt="">
                <h1>U-Konek</h1>
                <h2>+</h2>
            </div>
            <h5>A comprehensive healthcare management system designed for modern medical facilities. Streamline
                operations, manage patients, and enhance care.</h5>
            <img src="#" alt="">
            <h5>Trusted by 500+ professionals</h5>
        </div>
        <div class="card" role="main">
            <div class="brand">
                <h1 id="panel-title">Welcome Back</h1>
                <h4 id="panel-desc">Enter your credentials to access the portal</h4>
            </div>


            <div id="tab-login" class="tabs" role="tablist" aria-label="Authentication tabs">
            </div>


            <!-- Login Panel -->
            <div id="login-panel">
                <form id="login-form" novalidate autocomplete="off">
                    <div class="field">
                        <label class="inputLabel" for="username">Username</label>
                        <input id="username" type="text" placeholder="e.g., juan.dela.cruz" required
                            autocomplete="username" />
                    </div>

                    <div class="field">
                        <label class="inputLabel" for="password">Password</label>
                        <input id="password" type="password" placeholder="Enter your account password" required
                            autocomplete="current-password" />
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn" id="login-submit-btn">
                            <span class="btn-spinner" aria-hidden="true"></span>
                            <span class="btn-label">SIGN IN</span>
                        </button>
                    </div>
                    <div class="actions" style="margin-top: 8px; justify-content: flex-end;">
                        <button id="forgot-password-toggle" type="button" class="link">Forgot password?</button>
                    </div>
                    <div id="login-error" class="note" aria-live="polite" style="display:none"></div>
                </form>

                <form id="reset-form" novalidate autocomplete="off" style="display:none; margin-top: 12px;">
                    <h1 class="reminders" style="margin: 0 0 10px; font-size: 14px;">Enter your email and we'll send a
                        password reset OTP.</h1>
                    <div class="field">
                        <label class="inputLabel" for="reset-email">Email</label>
                        <input id="reset-email" type="email" placeholder="e.g., yourname@hospital.com" required />
                    </div>

                    <div id="reset-otp-step" style="display:none;">
                        <div class="field">
                            <label class="inputLabel" for="reset-otp">OTP</label>
                            <input id="reset-otp" type="text" placeholder="Enter 6-digit OTP" inputmode="numeric"
                                pattern="\d{6}" maxlength="6" />
                        </div>

                        <div class="field">
                            <label class="inputLabel" for="reset-new-password">New Password</label>
                            <input id="reset-new-password" type="password" placeholder="Enter new password"
                                minlength="6" autocomplete="new-password" />
                        </div>

                        <div class="field">
                            <label class="inputLabel" for="reset-confirm-password">Confirm New Password</label>
                            <input id="reset-confirm-password" type="password" placeholder="Confirm new password"
                                minlength="6" autocomplete="new-password" />
                        </div>
                    </div>

                    <div class="actions">
                        <button class="btn" type="submit" id="reset-submit-btn">
                            <span class="btn-spinner" aria-hidden="true"></span>
                            <span class="btn-label">Send OTP</span>
                        </button>
                    </div>
                    <div id="reset-msg" class="small" aria-live="polite" style="display:none"></div>
                </form>
            </div>


            <!-- Register Panel - MOVED TO DASHBOARD -->


        </div>
    </div>


    <!-- Registration modals MOVED TO DASHBOARD -->


    <script src="../js/script.js"></script>
</body>

</html>
